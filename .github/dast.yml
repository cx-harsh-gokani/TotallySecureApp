jobs:
  dast:
    runs-on: ubuntu-latest
    name: DAST on Prem Testing Action
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Create Output folder
        run: mkdir ${{ runner.temp }}/output
      - name: Change dast-config owner
        run: sudo chmod 777 -R dast-config        
      - name: Change dir owner
        run: sudo chown -R 1000:1000 ${{ runner.temp }}/output
      - name: Run DAST-CLI command
        run: |
           docker run --pull=always \
           -v ${{ runner.temp }}/output:/tmp \
           -e CX_APIKEY=eyJhbGciOiJIUzUxMiIsInR5cCIgOiAiSldUIiwia2lkIiA6ICI5ZDMzNDA4Yy0yMGVjLTQ2ZjgtYWY5ZC1kZTljYmU0MWZlOTIifQ..vMa8CFFD2ByJUHXoyV-9TCOsSAlcYDw9zXL1iGt1jcdvdwCjkd0r48ZNN8Cw9bHXWyg7PdVDBaWLUkK-TdWgIg \
           checkmarx/dast:latest \
           scan \
           --environment-id=d93345be-fc7d-4096-9d76-e99a0292ffed \
           --base-url=https://eu.ast.checkmarx.net \
           --output=/output
           
      - name: Set permission on output folder
        run: |
         sudo chown -R 1001:1001 ${{ runner.temp }}/output
      - name: Upload ZAP output
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: always()
        with:
          name: zap-output
          path: ${{ runner.temp }}/output
